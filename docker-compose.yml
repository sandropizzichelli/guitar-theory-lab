services:
  guitar-theory-lab:
    build:
      context: .
      args:
        SITE_NAME: ${SITE_NAME:-Guitar Theory Lab}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:8080}
        NEXT_PUBLIC_APP_DESCRIPTION: ${NEXT_PUBLIC_APP_DESCRIPTION:-Advanced online tools for guitar theory, harmonic exploration, voice leading, set theory and improvisational practice.}
    container_name: guitar-theory-lab
    restart: unless-stopped
    ports:
      - "8080:80"
